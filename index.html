<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM IPTV & MOVIE THEATER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body, div, header, footer, input, button { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .movie-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body id="theme-body" class="font-sans antialiased flex flex-col min-h-screen bg-[#0d1117] text-white">

    <!-- 📺 মেইন সাইট কন্টেন্ট -->
    <div id="main-content" class="flex-1 flex flex-col min-h-screen">
        
        <header id="theme-header" class="border-b border-gray-800 p-4 bg-[#161b22] flex flex-col sm:flex-row gap-4 justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold tracking-wider text-red-500">SIAM IPTV <span id="theme-badge" class="text-white text-sm bg-gray-700 px-2 py-0.5 rounded ml-1">PROJECT</span></h1>
                <nav class="flex bg-[#0d1117] p-1 rounded-lg border border-gray-800">
                    <button onclick="switchTab('tv')" id="tab-tv-btn" class="px-4 py-1.5 rounded-md text-xs font-bold bg-red-600 text-white transition cursor-pointer">📺 Live TV</button>
                    <button onclick="switchTab('movies')" id="tab-movies-btn" class="px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white transition cursor-pointer">🎬 Movie Theater</button>
                </nav>
            </div>
            <button onclick="toggleTheme()" id="theme-btn" class="p-1.5 bg-zinc-800 border border-zinc-700 rounded-md hover:bg-zinc-700 cursor-pointer text-sm">🌙</button>
        </header>

        <!-- TV Section -->
        <main id="tv-page-section" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div id="video-section" class="flex-1 bg-black flex flex-col justify-center items-center p-4">
                <div id="theme-player-box" class="w-full max-w-4xl aspect-video bg-zinc-900 rounded-lg overflow-hidden shadow-2xl border border-zinc-800">
                    <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                </div>
                <p id="now-playing" class="mt-3 text-gray-400 font-semibold text-lg">Select a Channel</p>
            </div>
            <div id="theme-sidebar" class="w-full lg:w-96 bg-[#161b22] border-l border-gray-800 flex flex-col">
                <input type="text" id="search-box" oninput="searchChannels()" placeholder="Search channels..." class="m-3 p-2 bg-[#0d1117] border border-gray-800 rounded-md text-sm">
                <div id="channel-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            </div>
        </main>

        <!-- Movie Section -->
        <main id="movie-page-section" class="hidden flex-1 flex flex-col p-6 max-w-7xl w-full mx-auto">
            <div id="movie-theater-player-container" class="hidden mb-8 w-full bg-black rounded-xl border border-zinc-800 p-2">
                <div class="flex justify-between p-2"><span id="movie-playing-title" class="font-bold text-red-500"></span><button onclick="closeMoviePlayer()" class="bg-zinc-800 px-2 rounded">❌ Close</button></div>
                <video id="movie-player" class="w-full aspect-video" controls></video>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <script>
        let allChannels = [];
        const tvVideoElement = document.getElementById('iptv-player');
        const movieVideoElement = document.getElementById('movie-player');

        // পেজ লোড হলেই চ্যানেল লোড হবে
        window.onload = loadChannelData;

        function loadChannelData() {
            fetch('channels.json')
                .then(res => res.json())
                .then(data => { allChannels = data; renderList(data); renderMovieGrid(); });
        }

        function switchTab(tab) {
            document.getElementById('tv-page-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-page-section').classList.toggle('hidden', tab !== 'movies');
        }

        function playChannel(url, name) {
            document.getElementById('now-playing').innerText = "⚡ Now Playing: " + name;
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(tvVideoElement);
            } else { tvVideoElement.src = url; }
        }

        function playMovie(url, name) {
            document.getElementById('movie-theater-player-container').classList.remove('hidden');
            document.getElementById('movie-playing-title').innerText = "🎬 " + name;
            movieVideoElement.src = url; movieVideoElement.play();
        }

        function closeMoviePlayer() {
            movieVideoElement.pause();
            document.getElementById('movie-theater-player-container').classList.add('hidden');
        }

        function renderList(channels) {
            const list = document.getElementById('channel-list');
            list.innerHTML = channels.map((ch, i) => `
                <div onclick="playChannel('${ch.url}', '${ch.name}')" class="p-2 bg-zinc-900 rounded cursor-pointer hover:bg-zinc-800">
                    ${ch.name}
                </div>`).join('');
        }

        function renderMovieGrid() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = allChannels.filter(ch => ch.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}', '${m.name}')" class="cursor-pointer">
                    <img src="${m.logo}" class="rounded w-full aspect-[2/3] object-cover">
                    <p class="text-xs mt-2">${m.name}</p>
                </div>`).join('');
        }

        function toggleTheme() { /* আপনার আগের থিম লজিক এখানে বসান */ }
        function searchChannels() { /* আপনার সার্চ লজিক এখানে বসান */ }
    </script>
</body>
</html>

        let hls = null;

        function renderGrid() {
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = data.map(c => `
                <div class="channel-card" onclick="openModal('${c.url}', '${c.name}')">
                    <img src="${c.logo}" class="w-16 h-16 object-contain mb-2">
                    <span class="text-[10px] font-bold text-center uppercase">${c.name}</span>
                </div>
            `).join('');
        }

        function openModal(url, name) {
            document.getElementById('video-modal').style.display = 'flex';
            document.getElementById('video-title').innerText = name;
            const video = document.getElementById('player');
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }

        function closeModal() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('player').pause();
        }

        renderGrid();

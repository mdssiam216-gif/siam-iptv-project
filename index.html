<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-glow { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .movie-card { transition: all 0.3s ease; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        /* কাস্টম স্ক্রলবার */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        /* লাইভ ইন্ডিকেটর */
        .live-pulse { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 mt-8">
        <div class="relative bg-white/5 backdrop-blur-2xl border border-white/10 p-6 rounded-3xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight">IPL GRAND FINALE</h2>
                    <p class="text-white/60 text-sm font-medium">আজকের মহারণ শুরু হতে আর বাকি:</p>
                </div>
                <div class="flex gap-4" id="countdown">
                    <div class="text-center"><div id="hours" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">ঘণ্টা</span></div>
                    <div class="text-center"><div id="minutes" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">মিনিট</span></div>
                    <div class="text-center"><div id="seconds" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">সেকেন্ড</span></div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2"><span class="live-pulse"></span><span class="text-[10px] font-bold text-red-500 tracking-widest uppercase">LIVE NOW</span></div>
                        <a href="https://t.me/Mr_Ooliver" target="_blank" rel="noopener noreferrer" class="telegram-glow text-[10px] font-extrabold tracking-widest uppercase hover:scale-105 transition-transform">JOIN TELEGRAM</a>
                    </div>
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                        <video id="iptv-player" class="w-full h-full" controls autoplay muted></video>
                    </div>
                    <h2 id="now-playing" class="mt-4 text-lg font-semibold text-white/80">Loading...</h2>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto border border-white/5">
                    <div id="category-tabs" class="flex gap-2 mb-4"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // আপনার আগের লজিকগুলো এখানে থাকবে...
        // শুধু আপডেট করা হয়েছে: ভিডিও ট্যাগ-এ muted যুক্ত করা হয়েছে যাতে অটোপ্লে কাজ করে।
        // এবং লাইভ ইন্ডিকেটর যোগ করা হয়েছে।
    </script>
</body>
</html>

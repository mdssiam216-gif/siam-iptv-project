<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); }
        .live-pulse { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-xl font-black">SIAM<span class="text-red-500">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-4 py-1 bg-red-600 rounded-full text-xs font-bold">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-4 py-1 bg-white/10 rounded-full text-xs font-bold">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex items-center gap-2 mb-2"><span class="live-pulse"></span><span class="text-[10px] font-bold text-red-500">LIVE NOW</span></div>
                    <div class="aspect-video bg-black rounded-xl overflow-hidden border border-white/10">
                        <video id="iptv-player" class="w-full h-full" controls autoplay muted></video>
                    </div>
                </div>
                <div id="channel-list" class="bg-white/5 p-4 rounded-xl h-[400px] overflow-y-auto space-y-2">
                    </div>
            </div>
        </div>

        <div id="movie-section" class="hidden">
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </div>
    </main>

    <script>
        let allChannels = [];
        async function loadData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderTV();
                renderMovies();
            } catch (e) { console.log("JSON ফাইলটি চেক করুন!"); }
        }

        function renderTV() {
            const list = document.getElementById('channel-list');
            list.innerHTML = allChannels.filter(c => c.category !== 'Movies').map(c => `
                <div onclick="playTv('${c.url}')" class="p-3 bg-white/5 rounded-lg cursor-pointer hover:bg-red-600/20">${c.name}</div>
            `).join('');
        }

        function renderMovies() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}')" class="bg-white/5 p-2 rounded-lg cursor-pointer">
                    <img src="${m.logo}" class="w-full h-40 object-cover rounded">
                    <p class="text-xs mt-2">${m.name}</p>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.getElementById('tv-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-section').classList.toggle('hidden', tab !== 'movies');
        }

        function playTv(url) {
            const v = document.getElementById('iptv-player');
            v.src = url; v.play();
        }

        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-glow { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-bold tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold">LIVE TV</button>
            <button onclick="switchTab('movies')" class="px-5 py-2 bg-white/5 rounded-full text-xs font-bold">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex justify-end mb-2"><a href="https://t.me/Mr_Ooliver" target="_blank" class="telegram-glow text-[10px] font-bold uppercase tracking-widest">JOIN TELEGRAM</a></div>
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10"><video id="iptv-player" class="w-full h-full" controls autoplay></video></div>
                    <h2 id="now-playing" class="mt-4 text-lg font-semibold">Loading...</h2>
                </div>
                
                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto border border-white/5">
                    <div id="category-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
        <div id="movie-section" class="hidden">
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        async function fetchData() {
            const res = await fetch('channels.json');
            allChannels = await res.json();
            renderCategories();
            filterChannels('All');
            // Auto play first channel
            const first = allChannels.find(c => c.category !== 'Movies');
            if(first) playTv(first.url, first.name);
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.filter(c => c.category !== 'Movies').map(c => c.category))];
            document.getElementById('category-tabs').innerHTML = cats.map(cat => 
                `<button onclick="filterChannels('${cat}')" class="px-3 py-1 bg-white/10 rounded-lg text-[10px] uppercase font-bold hover:bg-red-600 transition">${cat}</button>`
            ).join('');
        }

        function filterChannels(cat) {
            const list = document.getElementById('channel-list');
            const filtered = cat === 'All' ? allChannels.filter(c => c.category !== 'Movies') : allChannels.filter(c => c.category === cat);
            list.innerHTML = filtered.map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600/20 rounded-xl cursor-pointer flex items-center gap-3 transition">
                    <img src="${c.logo}" class="w-8 h-8 rounded-lg object-cover" onerror="this.style.display='none'">
                    <span class="text-sm">${c.name}</span>
                </div>
            `).join('');
        }

        function playTv(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const video = document.getElementById('iptv-player');
            if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
        }

        function switchTab(tab) {
            document.getElementById('tv-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-section').classList.toggle('hidden', tab !== 'movies');
        }
        fetchData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM IPTV & MOVIE THEATER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body, div, header, footer, input, button {
            transition: all 0.3s ease;
        }
        .movie-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body id="theme-body" class="font-sans antialiased flex flex-col min-h-screen bg-[#0d1117] text-white">

    <div id="main-content" class="flex-1 flex flex-col min-h-screen">
      
        <header class="border-b border-gray-800 p-4 bg-[#161b22] flex flex-col sm:flex-row gap-4 justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold tracking-wider text-red-500">SIAM IPTV <span class="text-white text-sm bg-gray-700 px-2 py-0.5 rounded ml-1">PROJECT</span></h1>
                
                <nav class="flex bg-[#0d1117] p-1 rounded-lg border border-gray-800">
                    <button onclick="switchTab('tv')" id="tab-tv-btn" class="px-4 py-1.5 rounded-md text-xs font-bold bg-red-600 text-white">📺 Live TV</button>
                    <button onclick="switchTab('movies')" id="tab-movies-btn" class="px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white">🎬 Movie Theater</button>
                </nav>
            </div>
        </header>

        <!-- Live TV -->
        <main id="tv-page-section" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <!-- তোমার আগের লাইভ টিভি কোড এখানে রাখো -->
            <div class="flex-1 bg-black flex flex-col justify-center items-center p-4">
                <video id="iptv-player" class="w-full max-w-4xl aspect-video" controls autoplay></video>
                <p id="now-playing" class="mt-4 text-lg">Select a Channel</p>
            </div>
        </main>

        <!-- Movie Theater -->
        <main id="movie-page-section" class="hidden flex-1 p-6 overflow-y-auto">
            <h2 class="text-3xl font-bold mb-6">🍿 Movie Theater</h2>
            <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <script>
        let allChannels = [];
        let currentCategory = 'All';
        let hlsTvInstance = null;
        let hlsMovieInstance = null;

        const tvVideo = document.getElementById('iptv-player');
        const movieVideo = document.getElementById('movie-player');

        function switchTab(tab) {
            document.getElementById('tv-page-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-page-section').classList.toggle('hidden', tab !== 'movies');
            
            if (tab === 'movies') renderMovieGrid();
        }

        function loadChannelData() {
            fetch('channels.json')
                .then(res => res.json())
                .then(data => {
                    allChannels = data;
                    console.log("Total Channels:", data.length);
                    console.log("Movies Found:", data.filter(m => m.category === "Movies").length);
                    renderList();
                    const firstTv = data.find(ch => ch.category !== 'Movies');
                    if (firstTv) playChannel(firstTv.url, firstTv.name);
                })
                .catch(err => console.error(err));
        }

        function renderList() {
            // তোমার লাইভ চ্যানেল লিস্ট কোড
            console.log("Live TV list rendered");
        }

        function renderMovieGrid() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            const movies = allChannels.filter(ch => ch.category === 'Movies');

            if (movies.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-20">কোনো মুভি পাওয়া যায়নি।</p>`;
                return;
            }

            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = `movie-card group cursor-pointer rounded-2xl overflow-hidden bg-zinc-900 border border-gray-700 hover:border-red-500`;
                div.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${movie.logo}" class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 flex items-end justify-center pb-6 opacity-0 group-hover:opacity-100 transition">
                            <span class="bg-red-600 text-white px-6 py-2 rounded-full text-sm font-bold">▶ WATCH</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="font-medium">${movie.name}</h4>
                    </div>
                `;
                div.onclick = () => playMovie(movie.url, movie.name);
                grid.appendChild(div);
            });
        }

        function playMovie(url, name) {
            alert(`🎬 Now Playing: ${name}\n\nURL: ${url}`);
        }

        function playChannel(url, name) {
            document.getElementById('now-playing').innerText = "⚡ Now Playing: " + name;
            // তোমার প্লে লজিক
        }

        window.addEventListener('DOMContentLoaded', loadChannelData);
    </script>
</body>
</html>

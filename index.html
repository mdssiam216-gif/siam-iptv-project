<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid #e2e8f0; }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-glow { color: #ea580c; font-weight: 800; }
        .movie-card { transition: all 0.3s ease; background: white; border: 1px solid #e2e8f0; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.15); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter text-gray-900">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 text-white rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <!-- TV Section -->
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex justify-end mb-3">
                        <a href="https://t.me/Mr_Ooliver" target="_blank" class="telegram-glow text-[10px] tracking-widest uppercase hover:underline">JOIN TELEGRAM</a>
                    </div>
                    <div class="aspect-video bg-gray-900 rounded-3xl overflow-hidden shadow-2xl">
                        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    </div>
                    <h2 id="now-playing" class="mt-4 text-lg font-semibold text-gray-800">Loading...</h2>
                </div>
                <div class="bg-white p-4 rounded-3xl h-[500px] overflow-y-auto border border-gray-100 shadow-sm">
                    <div id="category-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Movie Section -->
        <div id="movie-section" class="hidden">
            <div class="flex justify-end mb-3 mr-4">
                <a href="https://t.me/Mr_Ooliver" target="_blank" class="telegram-glow text-[10px] tracking-widest uppercase hover:underline">JOIN TELEGRAM</a>
            </div>
            <div id="movie-player-box" class="hidden mb-8">
                <div class="aspect-video bg-gray-900 rounded-3xl overflow-hidden shadow-2xl">
                    <video id="movie-player" class="w-full h-full" controls></video>
                </div>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderUI();
                renderCategories();
                filterChannels('All');
                const first = allChannels.find(c => c.category !== 'Movies');
                if(first) playTv(first.url, first.name);
            } catch (e) { console.error("Error:", e); }
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.filter(c => c.category !== 'Movies').map(c => c.category))];
            document.getElementById('category-tabs').innerHTML = cats.map(cat => 
                `<button onclick="filterChannels('${cat}')" class="px-3 py-1 bg-gray-100 hover:bg-red-600 hover:text-white rounded-lg text-[10px] uppercase font-bold transition">${cat}</button>`
            ).join('');
        }

        function filterChannels(cat) {
            const list = document.getElementById('channel-list');
            const filtered = cat === 'All' ? allChannels.filter(c => c.category !== 'Movies') : allChannels.filter(c => c.category === cat);
            list.innerHTML = filtered.map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white hover:bg-red-50 rounded-xl cursor-pointer flex items-center gap-3 transition border border-gray-100">
                    <img src="${c.logo}" class="w-8 h-8 rounded-lg object-cover" onerror="this.style.display='none'">
                    <span class="text-sm font-medium text-gray-700">${c.name}</span>
                </div>
            `).join('');
        }

        function renderUI() {
            document.getElementById('movie-grid').innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}', '${m.name}')" class="movie-card rounded-2xl overflow-hidden cursor-pointer">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-3"><p class="text-xs font-bold text-gray-800 truncate">${m.name}</p></div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            const tvSection = document.getElementById('tv-section');
            const movieSection = document.getElementById('movie-section');
            const tvPlayer = document.getElementById('iptv-player');
            const moviePlayer = document.getElementById('movie-player');
            const tvBtn = document.getElementById('tv-tab');
            const movieBtn = document.getElementById('movie-tab');

            if(tab === 'tv') {
                tvSection.classList.remove('hidden');
                movieSection.classList.add('hidden');
                moviePlayer.pause();
                tvBtn.className = "px-5 py-2 bg-red-600 text-white rounded-full text-xs font-bold transition";
                movieBtn.className = "px-5 py-2 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-full text-xs font-bold transition";
            } else {
                tvSection.classList.add('hidden');
                movieSection.classList.remove('hidden');
                tvPlayer.pause();
                movieBtn.className = "px-5 py-2 bg-red-600 text-white rounded-full text-xs font-bold transition";
                tvBtn.className = "px-5 py-2 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-full text-xs font-bold transition";
            }
        }

        function playTv(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const video = document.getElementById('iptv-player');
            if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
            else { video.src = url; video.play(); }
        }

        function playMovie(url, name) {
            document.getElementById('movie-player-box').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url;
            video.play();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        fetchData();
    </script>
</body>
</html>

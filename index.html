<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM IPTV & MOVIE THEATER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        
        .custom-player {
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }
        
        .player-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .custom-player:hover .player-overlay {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#0d1117] text-white min-h-screen">

    <div class="flex h-screen">

        <!-- Sidebar (আগের মতো রাখা হয়েছে) -->
        <div class="w-80 border-r border-white/10 bg-zinc-900/70 glass flex flex-col hidden md:flex">
            <!-- তোমার আগের সাইডবার কোড এখানে রাখো -->
            <!-- ... (আগের সাইডবার কোড) ... -->
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">

            <!-- Custom Player -->
            <main id="tv-page-section" class="flex-1 p-4 md:p-8 flex items-center justify-center bg-black">
                <div class="custom-player w-full max-w-5xl aspect-video relative">
                    <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    
                    <!-- Custom Overlay -->
                    <div class="player-overlay">
                        <div class="flex justify-between items-end">
                            <div>
                                <p id="now-playing" class="text-white text-lg font-semibold"></p>
                                <p class="text-zinc-400 text-sm">SIAM IPTV • LIVE</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="toggleFullscreen()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm">⛶ Fullscreen</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Movie Section -->
            <main id="movie-page-section" class="hidden flex-1 p-6 overflow-y-auto">
                <!-- তোমার মুভি সেকশন -->
            </main>
        </div>
    </div>

    <script>
        let hlsTvInstance = null;
        const tvVideo = document.getElementById('iptv-player');

        function playChannel(url, name) {
            document.getElementById('now-playing').innerHTML = `▶ ${name}`;
            
            if (hlsTvInstance) hlsTvInstance.destroy();
            
            if (Hls.isSupported()) {
                hlsTvInstance = new Hls();
                hlsTvInstance.loadSource(url);
                hlsTvInstance.attachMedia(tvVideo);
            } else {
                tvVideo.src = url;
            }
        }

        function toggleFullscreen() {
            const player = document.querySelector('.custom-player');
            if (!document.fullscreenElement) {
                player.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // বাকি সব ফাংশন (loadChannelData, renderList, switchTab ইত্যাদি) আগের মতো রাখো
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: scale(1.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <!-- IPL ব্যানার (শুধু টিভি সেকশনেই দেখাবে) -->
        <div id="ipl-banner" class="mb-8">
            <div class="relative bg-white/5 p-6 rounded-3xl border border-white/10">
                <h2 class="text-2xl font-black">IPL GRAND FINALE</h2>
                <div id="timer-container" class="text-red-500 font-bold mt-2">খেলা শুরু হয়ে গেছে!</div>
            </div>
        </div>

        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto border border-white/5">
                    <input type="text" id="tv-search" onkeyup="filterChannelsBySearch()" placeholder="চ্যানেল খুঁজুন..." class="w-full p-3 mb-4 bg-black/40 border border-white/10 rounded-xl text-sm outline-none">
                    <div id="category-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="movie-section" class="hidden">
            <input type="text" id="movie-search" onkeyup="filterMoviesBySearch()" placeholder="মুভি খুঁজুন..." class="w-full p-3 mb-6 bg-white/5 border border-white/10 rounded-2xl outline-none">
            <div id="movie-player-box" class="hidden mb-8">
                <video id="movie-player" class="w-full aspect-video rounded-3xl" controls></video>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        let hls = null;

        function switchTab(tab) {
            const tvSection = document.getElementById('tv-section');
            const movieSection = document.getElementById('movie-section');
            const iplBanner = document.getElementById('ipl-banner');
            const tvPlayer = document.getElementById('iptv-player');
            const moviePlayer = document.getElementById('movie-player');

            if(tab === 'tv') {
                tvSection.classList.remove('hidden');
                iplBanner.classList.remove('hidden');
                movieSection.classList.add('hidden');
                moviePlayer.pause(); // মুভি প্লেয়ার পজ
                moviePlayer.src = ""; // মুভি সোর্স রিসেট
            } else {
                movieSection.classList.remove('hidden');
                tvSection.classList.add('hidden');
                iplBanner.classList.add('hidden');
                tvPlayer.pause(); // টিভি প্লেয়ার পজ
                if(hls) hls.destroy(); // টিভি স্ট্রিম ধ্বংস
            }
            
            document.getElementById('tv-tab').classList.toggle('bg-red-600', tab === 'tv');
            document.getElementById('movie-tab').classList.toggle('bg-red-600', tab === 'movies');
        }

        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderUI(); renderCategories(); filterChannels('All');
            } catch (e) { console.error("Error"); }
        }

        // বাকি ফাংশনগুলো আগের মতোই থাকবে...
        function playTv(url, name) {
            const video = document.getElementById('iptv-player');
            if(hls) hls.destroy();
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play();
        }

        function playMovie(url, name) {
            document.getElementById('movie-player-box').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url; video.play();
        }
        
        // সার্চ ও রেন্ডার ফাংশনগুলো এখানে আগের মতোই বসিয়ে দিবে
        function filterChannelsBySearch() { /* আগের কোড */ }
        function filterMoviesBySearch() { /* আগের কোড */ }
        function renderCategories() { /* আগের কোড */ }
        function filterChannels(cat) { /* আগের কোড */ }
        function renderUI() { /* আগের কোড */ }

        fetchData();
    </script>
</body>
</html>

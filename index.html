<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 mt-8">
        <div id="timer-container" class="relative bg-white/5 backdrop-blur-2xl border border-white/10 p-6 rounded-3xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div>
                    <h2 class="text-2xl font-black text-white">IPL GRAND FINALE</h2>
                    <p class="text-white/60 text-sm">আজকের মহারণ শুরু হতে আর বাকি:</p>
                </div>
                <div class="flex gap-4">
                    <div class="text-center"><div id="hours" class="bg-black/40 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black">00</div><span class="text-[10px] text-white/50 uppercase">ঘণ্টা</span></div>
                    <div class="text-center"><div id="minutes" class="bg-black/40 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black">00</div><span class="text-[10px] text-white/50 uppercase">মিনিট</span></div>
                    <div class="text-center"><div id="seconds" class="bg-black/40 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black">00</div><span class="text-[10px] text-white/50 uppercase">সেকেন্ড</span></div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <input type="text" id="search-bar" onkeyup="filterContent()" placeholder="🔍 চ্যানেল বা মুভি খুঁজুন..." class="w-full p-4 mb-6 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-red-600 transition">
        
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10"><video id="iptv-player" class="w-full h-full" controls autoplay></video></div>
                    <h2 id="now-playing" class="mt-4 text-lg font-semibold text-white/80">Loading...</h2>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto border border-white/5">
                    <div id="category-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="movie-section" class="hidden">
            <div id="movie-player-box" class="hidden mb-8"><video id="movie-player" class="w-full aspect-video rounded-3xl" controls></video></div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        let hls = null;

        // টাইমার ও লাইভ স্ট্যাটাস
        const countDownDate = new Date("May 31, 2026 20:00:00").getTime();
        const x = setInterval(function() {
            const distance = countDownDate - new Date().getTime();
            if (distance < 0) { 
                clearInterval(x); 
                document.getElementById("timer-container").innerHTML = `<div class="text-center py-4"><span class="text-red-500 animate-pulse font-black text-3xl">● LIVE NOW</span></div>`; 
            } else {
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
            }
        }, 1000);

        // সার্চ ফাংশন
        function filterContent() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('#channel-list > div, #movie-grid > div').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
            });
        }

        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderUI(); renderCategories(); filterChannels('All');
            } catch (e) { console.error("Data Load Error"); }
        }

        function switchTab(tab) {
            document.getElementById('tv-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-section').classList.toggle('hidden', tab !== 'movies');
            document.getElementById('tv-tab').classList.toggle('bg-red-600', tab === 'tv');
            document.getElementById('movie-tab').classList.toggle('bg-red-600', tab === 'movies');
        }

        function playTv(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const video = document.getElementById('iptv-player');
            if(hls) hls.destroy();
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play();
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.filter(c => c.category !== 'Movies').map(c => c.category))];
            document.getElementById('category-tabs').innerHTML = cats.map(cat => `<button onclick="filterChannels('${cat}')" class="px-3 py-1 bg-white/10 rounded-lg text-[10px] uppercase font-bold hover:bg-red-600">${cat}</button>`).join('');
        }

        function filterChannels(cat) {
            const filtered = cat === 'All' ? allChannels.filter(c => c.category !== 'Movies') : allChannels.filter(c => c.category === cat);
            document.getElementById('channel-list').innerHTML = filtered.map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600/20 rounded-xl cursor-pointer flex items-center gap-3">
                    <img src="${c.logo}" class="w-8 h-8 rounded-lg" onerror="this.src='https://via.placeholder.com/50'">
                    <span class="text-sm">${c.name}</span>
                </div>`).join('');
        }

        function renderUI() {
            document.getElementById('movie-grid').innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}', '${m.name}')" class="movie-card bg-white/5 rounded-2xl p-2 cursor-pointer border border-white/5">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover rounded-xl">
                    <p class="text-xs mt-2 font-bold truncate">${m.name}</p>
                </div>`).join('');
        }

        function playMovie(url, name) {
            document.getElementById('movie-player-box').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url; video.play(); window.scrollTo(0, 0);
        }

        fetchData();
    </script>
</body>
</html>

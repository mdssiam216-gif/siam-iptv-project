<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-glow { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex justify-between items-center mb-3">
                        <h2 id="now-playing" class="text-sm font-bold text-white/60 uppercase tracking-widest">Playing: Select a Channel</h2>
                        <a href="https://t.me/Mr_Ooliver" target="_blank" class="telegram-glow text-[10px] font-extrabold tracking-widest uppercase hover:scale-105 transition-transform flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> JOIN TELEGRAM
                        </a>
                    </div>

                    <div class="relative group">
                        <div class="absolute top-4 left-4 z-20 flex items-center gap-2 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10">
                            <span class="relative flex h-2 w-2">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
                            </span>
                            <span class="text-[9px] font-black tracking-widest text-white uppercase">Live Now</span>
                        </div>
                        <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl relative shadow-red-900/20">
                            <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent pointer-events-none"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto border border-white/5">
                    <div id="category-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="movie-section" class="hidden">
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        let hls = null;

        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderUI(); renderCategories(); filterChannels('All');
                const first = allChannels.find(c => c.category !== 'Movies');
                if(first) playTv(first.url, first.name);
            } catch (e) { console.error("Error:", e); }
        }

        function switchTab(tab) {
            const tvSection = document.getElementById('tv-section');
            const movieSection = document.getElementById('movie-section');
            if(tab === 'tv') {
                tvSection.classList.remove('hidden'); movieSection.classList.add('hidden');
                document.getElementById('tv-tab').classList.add('bg-red-600'); document.getElementById('movie-tab').classList.remove('bg-red-600');
            } else {
                tvSection.classList.add('hidden'); movieSection.classList.remove('hidden');
                document.getElementById('movie-tab').classList.add('bg-red-600'); document.getElementById('tv-tab').classList.remove('bg-red-600');
            }
        }

        function playTv(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const video = document.getElementById('iptv-player');
            if(hls) hls.destroy();
            if(Hls.isSupported()){ hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
            else { video.src = url; video.play(); }
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.filter(c => c.category !== 'Movies').map(c => c.category))];
            document.getElementById('category-tabs').innerHTML = cats.map(cat => `<button onclick="filterChannels('${cat}')" class="px-3 py-1 bg-white/10 rounded-lg text-[10px] uppercase font-bold hover:bg-red-600 transition">${cat}</button>`).join('');
        }

        function filterChannels(cat) {
            const list = document.getElementById('channel-list');
            const filtered = cat === 'All' ? allChannels.filter(c => c.category !== 'Movies') : allChannels.filter(c => c.category === cat);
            list.innerHTML = filtered.map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600/20 rounded-xl cursor-pointer flex items-center gap-3 transition border border-white/5">
                    <img src="${c.logo}" class="w-8 h-8 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/50'">
                    <span class="text-sm font-medium">${c.name}</span>
                </div>
            `).join('');
        }

        function renderUI() {
            document.getElementById('movie-grid').innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div class="movie-card bg-white/5 rounded-2xl overflow-hidden cursor-pointer border border-white/5">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-3"><p class="text-xs font-bold truncate">${m.name}</p></div>
                </div>
            `).join('');
        }

        fetchData();
    </script>
</body>
</html>

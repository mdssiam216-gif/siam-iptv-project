<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card:hover { transform: translateY(-8px); transition: 0.3s; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- হেডার -->
    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <!-- ব্যানার -->
    <div class="max-w-6xl mx-auto px-4 mt-4">
        <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex flex-wrap items-center justify-between gap-4">
            <h2 class="font-black text-lg">IPL GRAND FINALE</h2>
            <div class="flex gap-4 font-mono font-bold" id="timer">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4">
        <!-- TV Section -->
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl h-[400px] overflow-y-auto border border-white/5">
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Movie Section -->
        <div id="movie-section" class="hidden">
            <div id="movie-player-box" class="hidden mb-6">
                <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                    <video id="movie-player" class="w-full h-full" controls></video>
                </div>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [], hls = null;

        function switchTab(tab) {
            const tvSec = document.getElementById('tv-section'), movSec = document.getElementById('movie-section');
            const tvP = document.getElementById('iptv-player'), movP = document.getElementById('movie-player');
            
            if(tab === 'tv') {
                movP.pause(); movP.src = ""; document.getElementById('movie-player-box').classList.add('hidden');
                tvSec.classList.remove('hidden'); movSec.classList.add('hidden');
                document.getElementById('tv-tab').className = "px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition";
                document.getElementById('movie-tab').className = "px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition";
            } else {
                tvP.pause(); if(hls) hls.destroy();
                tvSec.classList.add('hidden'); movSec.classList.remove('hidden');
                document.getElementById('movie-tab').className = "px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition";
                document.getElementById('tv-tab').className = "px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition";
            }
        }

        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderAll();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            document.getElementById('channel-list').innerHTML = allChannels.filter(c => c.category !== 'Movies').map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600 rounded-xl cursor-pointer text-sm">${c.name}</div>
            `).join('');
            
            document.getElementById('movie-grid').innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}')" class="movie-card bg-white/5 p-2 rounded-xl cursor-pointer">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover rounded-lg">
                    <p class="mt-2 text-xs font-bold truncate">${m.name}</p>
                </div>
            `).join('');
        }

        function playTv(url, name) {
            const video = document.getElementById('iptv-player');
            if(hls) hls.destroy();
            if(Hls.isSupported()){ hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
            else { video.src = url; video.play(); }
        }

        function playMovie(url) {
            document.getElementById('movie-player-box').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url; video.play();
            window.scrollTo(0,0);
        }

        fetchData();
    </script>
</body>
</html>

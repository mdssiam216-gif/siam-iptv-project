<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; }
        .section-title { color: #ef4444; font-weight: bold; margin-bottom: 1rem; border-left: 4px solid #ef4444; padding-left: 10px; }
    </style>
</head>
<body class="p-6">

    <!-- টেলিগ্রাম লিঙ্ক -->
    <div class="text-center mb-8">
        <a href="https://t.me/your_username" target="_blank" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-bold transition">JOIN TELEGRAM</a>
    </div>

    <h1 class="text-3xl font-bold text-center mb-10">SIAM <span class="text-red-500">PREMIUM</span></h1>

    <!-- লাইভ টিভি সেকশন -->
    <h2 class="section-title">LIVE TV</h2>
    <div id="tv-grid" class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-4 mb-10"></div>

    <!-- মুভি সেকশন -->
    <h2 class="section-title">MOVIES</h2>
    <div id="movie-grid" class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-4"></div>

    <script>
        const data = [/* তোমার JSON ডেটা এখানে বসাও */];

        function render() {
            const tvGrid = document.getElementById('tv-grid');
            const movieGrid = document.getElementById('movie-grid');

            data.forEach(item => {
                const card = `
                    <div class="bg-[#1a1a1a] p-3 rounded-lg hover:border border-red-500 cursor-pointer transition">
                        <img src="${item.logo}" class="w-full aspect-square object-cover rounded mb-2">
                        <p class="text-[10px] text-center font-bold uppercase truncate">${item.name}</p>
                    </div>
                `;
                
                if (item.category === 'Movies') {
                    movieGrid.innerHTML += card;
                } else {
                    tvGrid.innerHTML += card;
                }
            });
        }
        render();
    </script>
</body>
</html>

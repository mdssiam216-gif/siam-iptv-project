<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM IPTV & MOVIE THEATER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body, div, header, footer, input, button {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .movie-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body id="theme-body" class="font-sans antialiased flex flex-col min-h-screen bg-[#0d1117] text-white">

    <div id="login-screen" class="fixed inset-0 bg-[#0d1117] flex justify-center items-center p-4 z-[9999]">
        <div class="bg-[#161b22] border border-gray-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl text-center">
            <h2 class="text-2xl font-bold tracking-wider text-red-500 mb-2">SIAM IPTV <span class="text-white text-xs bg-gray-700 px-2 py-0.5 rounded ml-1">PROJECT</span></h2>
            <div class="space-y-4 text-left">
                <input type="text" id="login-username" placeholder="User ID" class="w-full bg-[#0d1117] border border-gray-800 rounded-md p-2.5 text-sm">
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-[#0d1117] border border-gray-800 rounded-md p-2.5 text-sm">
                <p id="login-error" class="text-xs text-red-500 font-semibold hidden">❌ ভুল আইডি অথবা পাসওয়ার্ড!</p>
                <button onclick="checkLogin()" class="w-full bg-red-600 py-2.5 rounded-md font-bold text-sm">Login</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden flex-1 flex flex-col min-h-screen">
        <header id="theme-header" class="border-b border-gray-800 p-4 bg-[#161b22] flex justify-between items-center">
            <h1 class="text-xl font-bold text-red-500">SIAM IPTV</h1>
            <nav class="flex bg-[#0d1117] p-1 rounded-lg border border-gray-800">
                <button onclick="switchTab('tv')" id="tab-tv-btn" class="px-4 py-1.5 rounded-md text-xs font-bold bg-red-600">📺 Live TV</button>
                <button onclick="switchTab('movies')" id="tab-movies-btn" class="px-4 py-1.5 rounded-md text-xs font-bold text-gray-400">🎬 Movie Theater</button>
            </nav>
        </header>

        <main id="tv-page-section" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div id="video-section" class="flex-1 bg-black flex flex-col justify-center items-center p-4">
                <video id="iptv-player" class="w-full max-w-4xl aspect-video bg-zinc-900 rounded-lg" controls autoplay></video>
                <p id="now-playing" class="mt-3 text-gray-400 font-semibold text-lg">Select a Channel</p>
            </div>
            <div id="theme-sidebar" class="w-full lg:w-96 bg-[#161b22] border-l border-gray-800 overflow-y-auto">
                <input type="text" id="search-box" oninput="searchChannels()" placeholder="Search channels..." class="m-3 w-[90%] bg-[#0d1117] border border-gray-800 rounded p-2 text-sm">
                <div id="channel-list" class="p-3 space-y-2"></div>
            </div>
        </main>

        <main id="movie-page-section" class="hidden flex-1 p-6">
            <div id="movie-theater-player-container" class="hidden mb-6 bg-black p-2 rounded-xl border border-zinc-800">
                <button onclick="closeMoviePlayer()" class="bg-red-600 px-3 py-1 text-xs rounded mb-2">❌ Close</button>
                <video id="movie-player" class="w-full aspect-video" controls></video>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <script>
        // আপনার আগের সকল লজিক এখানে ঠিকঠাক কাজ করবে
        function checkLogin() {
            if(document.getElementById('login-username').value === 'imtiyaz siam' && document.getElementById('login-password').value === 'siam123@') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadChannelData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
        function switchTab(tab) {
            document.getElementById('tv-page-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-page-section').classList.toggle('hidden', tab !== 'movies');
        }
        function closeMoviePlayer() {
            const player = document.getElementById('movie-player');
            player.pause(); player.removeAttribute('src'); player.load();
            document.getElementById('movie-theater-player-container').classList.add('hidden');
        }
        function searchChannels() { /* আপনার আগের ফাংশন */ }
        function loadChannelData() { /* আপনার আগের ফাংশন */ }
        function renderList(list) { /* আপনার আগের ফাংশন */ }
        function playChannel(url, name) { /* আপনার আগের ফাংশন */ }
        function playMovie(url, name) { /* আপনার আগের ফাংশন */ }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-bold tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-4 py-1.5 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-4 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">THEATER</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-4">
        <!-- TV Section -->
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    </div>
                    <h2 id="now-playing" class="mt-4 text-lg font-semibold">Select a channel to start</h2>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl h-[500px] overflow-y-auto">
                    <input type="text" id="search" oninput="searchChannels()" placeholder="Search channels..." class="w-full bg-black/50 p-3 rounded-xl border border-white/10 mb-4 text-sm focus:outline-none focus:border-red-500">
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Movie Section -->
        <div id="movie-section" class="hidden">
            <div id="movie-player-box" class="hidden mb-8">
                <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-white/10">
                    <video id="movie-player" class="w-full h-full" controls></video>
                </div>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="max-w-6xl mx-auto p-6 mt-10 border-t border-white/10">
        <div class="flex justify-center">
            <a href="https://t.me/Mr_Ooliver" target="_blank" class="text-blue-500 font-bold hover:underline">TELEGRAM</a>
        </div>
    </footer>

    <script>
        let allChannels = [];
        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                renderUI();
            } catch (e) { console.error("Error:", e); }
        }
        function switchTab(tab) {
            document.getElementById('tv-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-section').classList.toggle('hidden', tab !== 'movies');
            document.getElementById('tv-tab').className = tab === 'tv' ? 'px-4 py-1.5 bg-red-600 rounded-full text-xs font-bold transition' : 'px-4 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition';
            document.getElementById('movie-tab').className = tab === 'movies' ? 'px-4 py-1.5 bg-red-600 rounded-full text-xs font-bold transition' : 'px-4 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition';
        }
        function renderUI() {
            const list = document.getElementById('channel-list');
            const grid = document.getElementById('movie-grid');
            list.innerHTML = allChannels.filter(c => c.category !== 'Movies').map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600/20 rounded-lg cursor-pointer flex items-center gap-3 transition">
                    <img src="${c.logo}" class="w-8 h-8 rounded" onerror="this.style.display='none'">
                    <span class="text-sm font-medium">${c.name}</span>
                </div>
            `).join('');
            grid.innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}', '${m.name}')" class="movie-card bg-white/5 rounded-xl overflow-hidden cursor-pointer border border-white/5 transition">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-3"><p class="text-xs font-bold truncate">${m.name}</p></div>
                </div>
            `).join('');
        }
        function playTv(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const video = document.getElementById('iptv-player');
            if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
        }
        function playMovie(url, name) {
            document.getElementById('movie-player-box').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url;
            video.play();
        }
        fetchData();
    </script>
</body>
</html>

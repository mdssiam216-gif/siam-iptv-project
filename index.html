<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPTV & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-glow { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .movie-card { transition: all 0.3s ease; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- হেডার -->
    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black tracking-tighter text-white">SIAM<span class="gradient-text">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold transition">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold transition">MOVIES</button>
        </div>
    </header>

    <!-- প্রিমিয়াম আইপিএল ব্যানার (অটো-আপডেটিং) -->
    <div class="max-w-6xl mx-auto px-4 mt-8">
        <div id="banner-container" class="relative overflow-hidden bg-white/5 backdrop-blur-2xl border border-white/10 p-6 rounded-3xl shadow-2xl">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-600 rounded-full blur-[80px] opacity-20"></div>
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-red-600 rounded-2xl shadow-lg shadow-red-600/30">
                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white tracking-tight">IPL GRAND FINALE</h2>
                        <p id="status-text" class="text-white/60 text-sm font-medium">আজকের মহারণ শুরু হতে আর বাকি:</p>
                    </div>
                </div>
                <!-- টাইমার অথবা লাইভ বাটন -->
                <div id="action-area" class="flex gap-4">
                    <div class="text-center"><div id="hours" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">ঘণ্টা</span></div>
                    <div class="text-center"><div id="minutes" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">মিনিট</span></div>
                    <div class="text-center"><div id="seconds" class="bg-black/40 border border-white/10 w-16 h-16 flex items-center justify-center rounded-2xl text-2xl font-black text-white">00</div><span class="text-[10px] text-white/50 uppercase font-bold mt-1 block">সেকেন্ড</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4 mt-6">
        <!-- (বাকি কোড আগের মতো) -->
        <div id="tv-section">...</div>
        <div id="movie-section" class="hidden">...</div>
    </main>

    <script>
        // আইপিএল টাইমার লজিক
        const countDownDate = new Date("May 31, 2026 20:00:00").getTime();
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("status-text").innerText = "ম্যাচ লাইভ চলছে!";
                document.getElementById("action-area").innerHTML = `<button class="bg-red-600 px-8 py-4 rounded-2xl font-black animate-bounce">WATCH LIVE NOW</button>`;
            } else {
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            }
        }, 1000);

        // ... (বাকি ফাংশনগুলো আগের মতোই থাকবে) ...
    </script>
</body>
</html>

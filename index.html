<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM PREMIUM | IPL LIVE & MOVIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .movie-card:hover { transform: translateY(-8px); transition: 0.3s; }
    </style>
</head>
<body>

    <!-- হেডার -->
    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-black text-white">SIAM<span class="text-red-500">PREMIUM</span></h1>
        <div class="flex gap-2">
            <button onclick="switchTab('tv')" id="tv-tab" class="px-5 py-2 bg-red-600 rounded-full text-xs font-bold">LIVE TV</button>
            <button onclick="switchTab('movies')" id="movie-tab" class="px-5 py-2 bg-white/10 rounded-full text-xs font-bold">MOVIES</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <!-- TV Section -->
        <div id="tv-section">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl h-[500px] overflow-y-auto">
                    <div id="channel-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Movie Section -->
        <div id="movie-section" class="hidden">
            <div id="movie-player-container" class="hidden mb-6">
                <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                    <video id="movie-player" class="w-full h-full" controls></video>
                </div>
            </div>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        let hls = null;

        async function fetchData() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                
                // চ্যানেল এবং মুভি রেন্ডার করা
                renderChannels();
                renderMovies();
            } catch (e) { console.error("Error:", e); }
        }

        function switchTab(tab) {
            const tvSec = document.getElementById('tv-section');
            const movSec = document.getElementById('movie-section');
            const tvP = document.getElementById('iptv-player');
            const movP = document.getElementById('movie-player');
            const movBox = document.getElementById('movie-player-container');

            if(tab === 'tv') {
                movP.pause(); movP.src = ""; movBox.classList.add('hidden');
                tvSec.classList.remove('hidden'); movSec.classList.add('hidden');
                document.getElementById('tv-tab').className = "px-5 py-2 bg-red-600 rounded-full text-xs font-bold";
                document.getElementById('movie-tab').className = "px-5 py-2 bg-white/10 rounded-full text-xs font-bold";
            } else {
                tvP.pause(); if(hls) hls.destroy();
                tvSec.classList.add('hidden'); movSec.classList.remove('hidden');
                document.getElementById('movie-tab').className = "px-5 py-2 bg-red-600 rounded-full text-xs font-bold";
                document.getElementById('tv-tab').className = "px-5 py-2 bg-white/10 rounded-full text-xs font-bold";
            }
        }

        function playTv(url, name) {
            const video = document.getElementById('iptv-player');
            if(hls) hls.destroy();
            if(Hls.isSupported()){ hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.play(); }
            else { video.src = url; video.play(); }
        }

        function playMovie(url) {
            document.getElementById('movie-player-container').classList.remove('hidden');
            const video = document.getElementById('movie-player');
            video.src = url; video.play();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function renderChannels() {
            const list = document.getElementById('channel-list');
            list.innerHTML = allChannels.filter(c => c.category !== 'Movies').map(c => `
                <div onclick="playTv('${c.url}', '${c.name}')" class="p-3 bg-white/5 hover:bg-red-600 rounded-xl cursor-pointer">${c.name}</div>
            `).join('');
        }

        function renderMovies() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = allChannels.filter(c => c.category === 'Movies').map(m => `
                <div onclick="playMovie('${m.url}')" class="movie-card bg-white/5 p-2 rounded-xl cursor-pointer">
                    <img src="${m.logo}" class="w-full aspect-[2/3] object-cover rounded-lg">
                    <p class="mt-2 text-xs font-bold truncate">${m.name}</p>
                </div>
            `).join('');
        }

        fetchData();
    </script>
</body>
</html>

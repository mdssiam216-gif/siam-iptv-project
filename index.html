<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAM IPTV & MOVIE THEATER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        .movie-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body id="theme-body" class="font-sans antialiased flex flex-col min-h-screen bg-[#0d1117] text-white">
    
    <div id="main-content" class="flex-1 flex flex-col min-h-screen">
        <header class="border-b border-gray-800 p-4 bg-[#161b22] flex flex-col sm:flex-row gap-4 justify-between items-center">
            <h1 class="text-xl font-bold text-red-500">SIAM IPTV <span class="text-white text-sm bg-gray-700 px-2 rounded">PROJECT</span></h1>
            <nav class="flex bg-[#0d1117] p-1 rounded-lg border border-gray-800">
                <button onclick="switchTab('tv')" id="tab-tv-btn" class="px-4 py-1.5 rounded-md text-xs font-bold bg-red-600 text-white">📺 Live TV</button>
                <button onclick="switchTab('movies')" id="tab-movies-btn" class="px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white">🎬 Movie Theater</button>
            </nav>
        </header>

        <!-- TV Section -->
        <main id="tv-page-section" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div class="flex-1 bg-black flex flex-col justify-center items-center p-4">
                <div class="w-full max-w-4xl aspect-video bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800">
                    <video id="iptv-player" class="w-full h-full" controls autoplay></video>
                </div>
                <p id="now-playing" class="mt-3 text-gray-400 font-semibold">Select a Channel</p>
            </div>
            <div class="w-full lg:w-96 bg-[#161b22] border-l border-gray-800 flex flex-col">
                <div class="p-3 border-b border-gray-800 flex gap-2 overflow-x-auto text-xs">
                    <button onclick="filterCategory('All')" class="bg-red-600 px-3 py-1.5 rounded text-white">All</button>
                    <button onclick="filterCategory('Sports')" class="bg-zinc-800 px-3 py-1.5 rounded text-white">Sports</button>
                    <button onclick="filterCategory('News')" class="bg-zinc-800 px-3 py-1.5 rounded text-white">News</button>
                    <button onclick="filterCategory('Entertainment')" class="bg-zinc-800 px-3 py-1.5 rounded text-white">Ent</button>
                </div>
                <input type="text" id="search-box" oninput="renderList()" placeholder="Search channels..." class="m-3 bg-black border border-gray-800 rounded p-2 text-sm">
                <div id="channel-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            </div>
        </main>

        <!-- Movie Section -->
        <main id="movie-page-section" class="hidden flex-1 p-6 max-w-7xl w-full mx-auto">
            <div id="movie-theater-player-container" class="hidden mb-6 w-full bg-black rounded-xl border border-zinc-800 p-2">
                <div class="flex justify-between p-2 text-sm"><span id="movie-playing-title" class="font-bold text-red-500"></span><button onclick="closeMoviePlayer()" class="bg-zinc-800 px-2 rounded">❌ Close</button></div>
                <video id="movie-player" class="w-full aspect-video" controls></video>
            </div>
            <input type="text" id="movie-search-box" oninput="renderMovieGrid()" placeholder="Search movies..." class="w-full mb-6 bg-[#161b22] border border-gray-800 rounded p-2 text-sm">
            <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <script>
        // আপনার ডাটা এখানে রাখুন (JSON ফাইলের পরিবর্তে)
        let allChannels = [
            {"id": 1, "name": "ATN news", "category": "News", "logo": "https://upload.wikimedia.org/wikipedia/en/thumb/1/18/ATN_News_Logo_without_slogan.svg/250px-ATN_News_Logo_without_slogan.svg.png", "url": "https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/1706-audio_113362_eng=113200-video=442000.m3u8"},
            {"id": 2, "name": "DD Sports", "category": "Sports", "logo": "https://i.postimg.cc/7hVCMDyZ/dd-sports.jpg", "url": "https://d3qs3d2rkhfqrt.cloudfront.net/out/v1/b17adfe543354fdd8d189b110617cddd/index_3.m3u8"},
            {"id": 6, "name": "Sambhavam Adhyayam Onnu", "category": "Movies", "logo": "https://ftpbd.net/wp-content/uploads/2026/04/tBNSo4T0R8UztkkpjYkzXI4bFAT-288x400.jpg", "url": "https://www.ftpbd.net/wp-content/hls-file/Sambhavam-Adhyayam-Onnu-2026-Hindi-Dubbed-1080p-WEBDL_reencoded/index.m3u8"},
            {"id": 23, "name": "Rakkhosh", "category": "Movies", "logo": "https://i.imgbd.org/poster_im9v1779295428.jpg", "url": "https://play.movielinkbd.mom/watch/ZxlPCBCZ-IQ6N1oF.9qHbBodzAsloCQgwjxlcmaB3_h6BtMox90-y-SDSDVZ40sCBkjTbfy6yK_12SiaJBk7LgtvSi9B3.2BFAtnFVcsMXbrm6--W90w"}
        ];

        let currentCategory = 'All';

        function switchTab(tab) {
            document.getElementById('tv-page-section').classList.toggle('hidden', tab !== 'tv');
            document.getElementById('movie-page-section').classList.toggle('hidden', tab !== 'movies');
            if(tab === 'movies') renderMovieGrid();
        }

        function renderList() {
            const container = document.getElementById('channel-list');
            const query = document.getElementById('search-box').value.toLowerCase();
            container.innerHTML = '';
            allChannels.filter(ch => ch.category !== 'Movies' && (currentCategory === 'All' || ch.category === currentCategory) && ch.name.toLowerCase().includes(query)).forEach(ch => {
                container.innerHTML += `<div onclick="playChannel('${ch.url}', '${ch.name}')" class="flex items-center gap-3 p-2 bg-zinc-900 rounded cursor-pointer"><img src="${ch.logo}" class="w-8 h-8 rounded"><span class="text-sm">${ch.name}</span></div>`;
            });
        }

        function renderMovieGrid() {
            const grid = document.getElementById('movie-grid');
            const query = document.getElementById('movie-search-box').value.toLowerCase();
            grid.innerHTML = '';
            allChannels.filter(m => m.category === 'Movies' && m.name.toLowerCase().includes(query)).forEach(m => {
                grid.innerHTML += `<div onclick="playMovie('${m.url}', '${m.name}')" class="movie-card cursor-pointer bg-[#161b22] p-2 rounded-xl"><img src="${m.logo}" class="w-full aspect-[2/3] rounded object-cover"><h4 class="text-xs font-bold mt-2">${m.name}</h4></div>`;
            });
        }

        function playChannel(url, name) {
            document.getElementById('now-playing').innerText = "Playing: " + name;
            const player = document.getElementById('iptv-player');
            if (Hls.isSupported()) { 
                let hls = new Hls(); 
                hls.loadSource(url); 
                hls.attachMedia(player); 
                player.play(); 
            }
        }

        function playMovie(url, name) {
            document.getElementById('movie-theater-player-container').classList.remove('hidden');
            document.getElementById('movie-playing-title').innerText = name;
            const player = document.getElementById('movie-player');
            player.src = url; 
            player.play();
        }

        function closeMoviePlayer() { 
            document.getElementById('movie-theater-player-container').classList.add('hidden'); 
            document.getElementById('movie-player').pause(); 
        }

        function filterCategory(cat) { currentCategory = cat; renderList(); }

        // পেজ লোড হওয়ার সাথে সাথে রেন্ডার
        renderList();
    </script>
</body>
</html>

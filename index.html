<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE IPTV PROJECT</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0d1117; color: white; }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="border-b border-gray-800 p-4 bg-[#161b22] flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider text-red-500">FREE IPTV <span class="text-white text-sm bg-gray-700 px-2 py-0.5 rounded ml-1">PROJECT</span></h1>
        <a href="https://t.me/Mr_Ooliver" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-xs px-3 py-1.5 rounded font-bold">TELEGRAM</a>
    </header>

    <main class="flex flex-col lg:flex-row h-[calc(100vh-65px)] overflow-hidden">
        <div class="flex-1 bg-black flex flex-col justify-center items-center p-4">
      <!-- ওপরে নতুন বাংলা লেখা যোগ করার কোড -->
      <div class="text-center mb-6 px-4">
        <h2 class="text-xl md:text-3xl font-bold text-white drop-shadow-md">
          স্বাগতম সিয়ামের লাইভ টিভি প্ল্যাটফর্মে! 📺
        </h2>
        <p class="text-xs md:text-sm text-gray-400 mt-2 font-medium tracking-wide">
          বাফারিং ছাড়া একদম ফুল এইচডি-তে লাইভ খেলা ও বিনোদন উপভোগ করুন।
        </p>
      </div>

      <div class="w-full max-w-4xl aspect-video bg-zinc-900 rounded-lg overflow-hidden shadow-2xl border border-zinc-800">
        <video id="iptv-player" class="w-full h-full" controls autoplay></video>
      </div>
      <p id="now-playing" class="mt-3 text-gray-400 font-semibold text-lg">Select a Channel to Play</p>
    </div>

        <div class="w-full lg:w-96 bg-[#161b22] border-t lg:border-t-0 lg:border-l border-gray-800 flex flex-col h-full">
            <div class="p-3 border-b border-gray-800 flex gap-1.5 overflow-x-auto text-xs">
                <button onclick="filterCategory('All')" class="bg-red-600 px-3 py-1.5 rounded-md font-bold cursor-pointer">All Channels</button>
                <button onclick="filterCategory('Sports')" class="bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded-md font-medium cursor-pointer">Sports</button>
                <button onclick="filterCategory('News')" class="bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded-md font-medium cursor-pointer">News</button>
                <button onclick="filterCategory('Entertainment')" class="bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded-md font-medium cursor-pointer">Entertainment</button>
            </div>

            <div class="p-3">
                <input type="text" id="search-box" oninput="searchChannels()" placeholder="Search channels..." class="w-full bg-[#0d1117] border border-gray-800 rounded-md p-2 text-sm focus:outline-none focus:border-red-500">
            </div>

            <div id="channel-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        const videoElement = document.getElementById('iptv-player');
        let hlsInstance = null;

        fetch('channels.json')
            .then(res => res.json())
            .then(data => {
                allChannels = data;
                renderList(allChannels);
                if(data.length > 0) playChannel(data[0].url, data[0].name);
            }).catch(err => console.error("Error loading JSON:", err));

        function renderList(channels) {
            const listContainer = document.getElementById('channel-list');
            listContainer.innerHTML = '';
            channels.forEach((ch, index) => {
                listContainer.innerHTML += `
                    <div onclick="playChannel('${ch.url}', '${ch.name}')" class="flex items-center gap-3 p-2 bg-[#0d1117] hover:bg-zinc-900 border border-gray-800 rounded-md cursor-pointer transition-all">
                        <span class="text-xs font-bold text-red-500 w-4">${index + 1}</span>
                        <img src="${ch.logo}" class="w-8 h-8 rounded object-cover bg-white" onerror="this.src='https://placehold.co/50x50?text=TV'">
                        <span class="text-sm font-medium tracking-wide">${ch.name}</span>
                    </div>
                `;
            });
        }

        function playChannel(url, name) {
            document.getElementById('now-playing').innerText = "⚡ Now Playing: " + name;
            if (Hls.isSupported()) {
                if (hlsInstance) hlsInstance.destroy();
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = url;
            }
        }

        function filterCategory(cat) {
            if(cat === 'All') renderList(allChannels);
            else {
                const filtered = allChannels.filter(ch => ch.category === cat);
                renderList(filtered);
            }
        }

        // Search Engine Logic
        function searchChannels() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
            renderList(filtered);
        }
    </script>
</body>
</html>
